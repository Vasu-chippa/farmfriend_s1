[build]
  # Build command: change if you use yarn or pnpm
  command = "npm run build --prefix frontend"
  publish = "frontend/build"

[context.production.environment]
  # Set this in Netlify UI too: REACT_APP_API_URL=https://farmfriend-v-ak1n.onrender.com/api
  REACT_APP_API_URL = "https://farmfriend-v-ak1n.onrender.com/api"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
